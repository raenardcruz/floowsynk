version: '3.8'
services:
  db:
    image: postgres:15
    env_file:
      - ./Server/.env
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-floowsynk}
      POSTGRES_DB: ${DB_NAME:-floowsynk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - floowsynk_network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server
    networks:
      - floowsynk_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - floowsynk_network

  server:
    build:
      context: .
      dockerfile: Server/Dockerfile
    ports:
      - "8082:8082"
      - "8083:8083"
      - "50051:50051"
    env_file:
      - ./Server/.env
    environment:
      - DB_HOST=db
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - floowsynk_network

  app:
    build:
      context: .
      dockerfile: App/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_SERVER=http://localhost:8082
    depends_on:
      - server
    networks:
      - floowsynk_network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  floowsynk_network:
    driver: bridge